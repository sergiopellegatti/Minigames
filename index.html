<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Quanti e la Missione dell’Invisibile</title>
    <style>
        body { background-color: #000; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif; color: #fff; margin: 0; padding: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges; image-rendering: pixelated; }
    </style>
</head>
<body>
    <canvas id="displayCanvas"></canvas>
    <script>
        const displayCanvas = document.getElementById('displayCanvas');
        const displayCtx = displayCanvas.getContext('2d');
        const gameCanvas = document.createElement('canvas');
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 450;
        gameCanvas.width = GAME_WIDTH;
        gameCanvas.height = GAME_HEIGHT;
        const ctx = gameCanvas.getContext('2d');

        const gravity = 0.6, jumpStrength = -15, quantumJumpStrength = -28;
        let QUANTA_GOAL = 10;
        let keys = {}, scale = 1, scrollOffset = 0, score = 0, quantumLeapReady = false, gameState = 'start';
        const player = { x: 0, y: 0, width: 40, height: 40, speed: 5, velocityX: 0, velocityY: 0, isJumping: true };
        const platforms = [], quanta = [], electrons = [], atoms = [];
        let electronTimer = 0, electronInterval = 120;

        const touchControls = { left: { x: 50, y: GAME_HEIGHT - 90, width: 70, height: 70, key: 'ArrowLeft' }, right: { x: 140, y: GAME_HEIGHT - 90, width: 70, height: 70, key: 'ArrowRight' }, jump: { x: GAME_WIDTH - 120, y: GAME_HEIGHT - 90, width: 70, height: 70, key: 'Space' } };
        const fullscreenButton = { x: GAME_WIDTH - 50, y: 10, width: 40, height: 40 };
        const startButton = { x: GAME_WIDTH / 2 - 100, y: GAME_HEIGHT / 2 + 80, width: 200, height: 50 };
        const audioToggleButton = { x: GAME_WIDTH - 100, y: 10, width: 40, height: 40 };
        const isFullscreenSupported = typeof document.fullscreenEnabled !== 'undefined' || typeof document.webkitFullscreenEnabled !== 'undefined';
        let isAudioEnabled = false, audio = {}, audioInitialized = false;
        const audioSources = { music: "", jump: "", collect: "" };

        window.addEventListener('keydown', e => { keys[e.code] = true; if ((gameState === 'start' || gameState === 'complete') && (e.code === 'Enter' || e.code === 'Space')) resetLevel(); });
        window.addEventListener('keyup', e => { keys[e.code] = false; });
        function getTouchPos(touch) { const rect = displayCanvas.getBoundingClientRect(); return { x: touch.clientX - rect.left, y: touch.clientY - rect.top }; }
        function isInside(pos, button, s) { return pos.x > button.x * s && pos.x < (button.x + button.width) * s && pos.y < (button.y + button.height) * s && pos.y > button.y * s; }
        function handleTouches(e) { e.preventDefault(); Object.keys(touchControls).forEach(k => keys[touchControls[k].key] = false); for (let i = 0; i < e.touches.length; i++) { const pos = getTouchPos(e.touches[i]); for (const key in touchControls) { if (isInside(pos, touchControls[key], scale)) keys[touchControls[key].key] = true; } } }
        function handleTap(e) { const touch = e.changedTouches[0]; if (!touch) return; const pos = getTouchPos(touch); if ((gameState === 'start' || gameState === 'complete') && isInside(pos, startButton, scale)) { resetLevel(); return; } if (isFullscreenSupported && isInside(pos, fullscreenButton, scale)) { toggleFullscreen(); return; } if (isInside(pos, audioToggleButton, scale)) { isAudioEnabled = !isAudioEnabled; if (isAudioEnabled) initAudio(); else if (audio.music) audio.music.pause(); } }
        displayCanvas.addEventListener('touchstart', handleTouches, { passive: false });
        displayCanvas.addEventListener('touchmove', handleTouches, { passive: false });
        displayCanvas.addEventListener('touchend', e => { handleTap(e); handleTouches(e); }, { passive: false });
        displayCanvas.addEventListener('click', e => { const clickPos = { x: e.offsetX, y: e.offsetY }; if ((gameState === 'start' || gameState === 'complete') && isInside(clickPos, startButton, scale)) { resetLevel(); return; } if (isFullscreenSupported && isInside(clickPos, fullscreenButton, scale)) { toggleFullscreen(); return; } if (isInside(clickPos, audioToggleButton, scale)) { isAudioEnabled = !isAudioEnabled; if (isAudioEnabled) initAudio(); else if (audio.music) audio.music.pause(); } });

        function initAudio() { if (audioInitialized || !isAudioEnabled) return; audio.music = new Audio(audioSources.music); audio.music.loop = true; audio.jump = new Audio(audioSources.jump); audio.collect = new Audio(audioSources.collect); audioInitialized = true; playMusic(); }
        function playSound(sound) { if (!isAudioEnabled || !audioInitialized || !audio[sound]) return; audio[sound].currentTime = 0; audio[sound].play().catch(err => { if (window.console && console.log) console.log(`Audio error:`, err); }); }
        function playMusic() { if (!isAudioEnabled || !audioInitialized || !audio.music) return; audio.music.play().catch(err => { if (window.console && console.log) console.log(`Audio error:`, err); }); }
        function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(err => console.log(err)); else document.exitFullscreen?.(); }

        function update() { if (keys['ArrowLeft'] || keys['KeyA']) player.velocityX = -player.speed; else if (keys['ArrowRight'] || keys['KeyD']) player.velocityX = player.speed; else player.velocityX = 0; player.x += player.velocityX; const worldWidth = platforms.length > 0 ? platforms[platforms.length - 1].x + platforms[platforms.length - 1].width : GAME_WIDTH; scrollOffset = player.x - GAME_WIDTH / 2; if (scrollOffset < 0) scrollOffset = 0; if (scrollOffset > worldWidth - GAME_WIDTH) scrollOffset = worldWidth - GAME_WIDTH; player.y += player.velocityY; player.velocityY += gravity; platforms.forEach(p => { if (player.x + player.width > p.x && player.x < p.x + p.width && player.y + player.height >= p.y && player.y + player.height <= p.y + player.velocityY && player.velocityY >= 0) { player.y = p.y - player.height; player.velocityY = 0; player.isJumping = false; if (p.goal) gameState = 'complete'; } }); quanta.forEach(q => { if (q.active && player.x < q.x + q.width && player.x + player.width > q.x && player.y < q.y + q.height && player.y + player.height > q.y) { q.active = false; score++; playSound('collect'); if (score >= QUANTA_GOAL) quantumLeapReady = true; } }); updateElectrons(); if ((keys['Space'] || keys['ArrowUp']) && !player.isJumping) { player.isJumping = true; playSound('jump'); player.velocityY = quantumLeapReady ? quantumJumpStrength : jumpStrength; if (quantumLeapReady) quantumLeapReady = false; } if (player.y > GAME_HEIGHT) resetLevel(); }
        function spawnElectron() { const y = Math.random() * GAME_HEIGHT; const speed = 2 + Math.random() * 2; if (Math.random() > 0.5) { electrons.push({ x: scrollOffset - 20, y: y, width: 10, height: 10, speed: speed }); } else { electrons.push({ x: scrollOffset + GAME_WIDTH + 20, y: y, width: 10, height: 10, speed: -speed }); } }
        function updateElectrons() { electronTimer++; if (electronTimer > electronInterval) { spawnElectron(); electronTimer = 0; } electrons.forEach((e, index) => { e.x += e.speed; if (e.x < scrollOffset - 50 || e.x > scrollOffset + GAME_WIDTH + 50) electrons.splice(index, 1); if (player.x < e.x + e.width && player.x + player.width > e.x && player.y < e.y + e.height && player.y + player.height > e.y) resetLevel(); }); }

        function setupLevel() {
            platforms.length = 0; quanta.length = 0; atoms.length = 0;
            let currentX = 200;
            for (let i = 0; i < 10; i++) {
                const y = GAME_HEIGHT - 150 - (Math.random() * 150);
                const width = 80 + Math.random() * 50;
                platforms.push({ x: currentX, y: y, width: width, height: width });
                atoms.push({x: currentX + width/2, y: y + width/2, radius: width/2});
                if (i > 0) quanta.push({ x: currentX + width/2, y: y - 40, width: 15, height: 15, active: true });
                currentX += 300 + Math.random() * 100;
            }
            platforms.push({ x: currentX, y: GAME_HEIGHT - 150, width: 100, height: 100, goal: true });
            atoms.push({x: currentX + 50, y: GAME_HEIGHT - 100, radius: 50, goal: true});
            QUANTA_GOAL = quanta.length;
        }
        function resetLevel() { if (isAudioEnabled && !audioInitialized) initAudio(); setupLevel(); player.x = platforms[0].x + (platforms[0].width/2) - (player.width/2); player.y = platforms[0].y - player.height; player.velocityY = 0; player.isJumping = true; scrollOffset = 0; score = 0; quantumLeapReady = false; electrons.length = 0; electronTimer = 0; gameState = 'playing'; }

        function drawBackground() { ctx.fillStyle = '#101020'; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT); }
        function drawPlatforms(dCtx) { atoms.forEach(a => { const grad = dCtx.createRadialGradient(a.x-scrollOffset, a.y, a.radius*0.1, a.x-scrollOffset, a.y, a.radius); grad.addColorStop(0, a.goal ? 'rgba(255,223,0,0.8)' : 'rgba(150,150,255,0.5)'); grad.addColorStop(1, 'rgba(100,100,255,0)'); dCtx.fillStyle = grad; dCtx.beginPath(); dCtx.arc(a.x - scrollOffset, a.y, a.radius, 0, Math.PI * 2); dCtx.fill(); }); }
        function drawPlayer(dCtx) { const p = player; dCtx.save(); dCtx.translate(p.x - scrollOffset, p.y); const progress = Math.min(score / QUANTA_GOAL, 1); const g = Math.floor(255 - (150 * progress)); const b = Math.floor(0 + (100 * progress)); const currentColor = `rgb(255, ${g}, ${b})`; dCtx.shadowColor = quantumLeapReady ? 'white' : 'yellow'; dCtx.shadowBlur = 20; dCtx.fillStyle = currentColor; dCtx.beginPath(); dCtx.arc(p.width / 2, p.height / 2, p.width / 3, 0, Math.PI * 2); dCtx.fill(); dCtx.shadowBlur = 0; dCtx.fillStyle = '#888'; dCtx.fillRect(p.width/2 - 5, p.height/2, 10, p.height/2 + 5); if (p.isJumping) { dCtx.fillStyle = 'orange'; for (let i=0;i<5;i++) { dCtx.beginPath(); dCtx.arc(p.width/2, p.height+Math.random()*10, Math.random()*5, 0, Math.PI*2); dCtx.fill(); } } dCtx.strokeStyle = 'black'; dCtx.lineWidth = 2; dCtx.fillStyle = 'white'; dCtx.beginPath(); dCtx.arc(p.width/3, p.height/2, 6, 0, Math.PI*2); dCtx.fill(); dCtx.stroke(); dCtx.beginPath(); dCtx.arc(p.width*2/3, p.height/2, 6, 0, Math.PI*2); dCtx.fill(); dCtx.stroke(); dCtx.beginPath(); dCtx.moveTo(p.width/3+6, p.height/2); dCtx.lineTo(p.width*2/3-6, p.height/2); dCtx.stroke(); dCtx.restore(); }
        function drawQuanta(dCtx) { dCtx.fillStyle = 'gold'; quanta.forEach(q => { if (q.active) { dCtx.beginPath(); dCtx.arc(q.x - scrollOffset, q.y, q.width, 0, Math.PI * 2); dCtx.fill(); } }); }
        function drawElectrons(dCtx) { dCtx.fillStyle = 'cyan'; electrons.forEach(e => { dCtx.beginPath(); dCtx.arc(e.x - scrollOffset, e.y, e.width / 2, 0, Math.PI * 2); dCtx.fill(); }); }

        function drawUI(dCtx, s) { dCtx.fillStyle = 'white'; dCtx.font = `${24*s}px "Comic Sans MS"`; dCtx.textAlign = 'left'; dCtx.fillText('Energia: ' + score + ' / ' + QUANTA_GOAL, 20 * s, 30 * s); if (quantumLeapReady) { dCtx.fillStyle = '#00dddd'; dCtx.font = `bold ${20*s}px "Comic Sans MS"`; dCtx.textAlign = 'center'; dCtx.fillText('SALTO QUANTICO PRONTO!', (GAME_WIDTH / 2) * s, 30 * s); } drawControls(dCtx, s); drawFullscreenButton(dCtx, s); drawAudioButton(dCtx, s); }
        function drawControls(dCtx, s) { dCtx.globalAlpha = 0.5; for (const key in touchControls) { const btn = touchControls[key]; dCtx.fillStyle = keys[btn.key] ? '#999' : '#4a4a4a'; dCtx.fillRect(btn.x * s, btn.y * s, btn.width * s, btn.height * s); dCtx.fillStyle = 'white'; dCtx.font = `bold ${30*s}px sans-serif`; dCtx.textAlign = 'center'; dCtx.textBaseline = 'middle'; let text = ''; if (key === 'left') text = '◀'; else if (key === 'right') text = '▶'; else if (key === 'jump') text = '▲'; dCtx.fillText(text, (btn.x + btn.width / 2) * s, (btn.y + btn.height / 2 + 2) * s); } dCtx.globalAlpha = 1.0; }
        function drawAudioButton(dCtx, s) { const btn = audioToggleButton; dCtx.strokeStyle = 'white'; dCtx.lineWidth = 2*s; dCtx.strokeRect(btn.x*s, btn.y*s, btn.width*s, btn.height*s); dCtx.font = `bold ${24*s}px sans-serif`; dCtx.textAlign = 'center'; dCtx.textBaseline = 'middle'; dCtx.fillStyle = 'white'; if (isAudioEnabled) dCtx.fillText('🔊', (btn.x + btn.width/2)*s, (btn.y + btn.height/2 + 2)*s); else dCtx.fillText('🔇', (btn.x + btn.width/2)*s, (btn.y + btn.height/2 + 2)*s); }
        function drawFullscreenButton(dCtx, s) { if (!isFullscreenSupported) return; dCtx.strokeStyle = 'white'; dCtx.lineWidth = 3*s; const { x, y, width: w, height: h } = fullscreenButton; const L = 10; dCtx.beginPath(); dCtx.moveTo((x)*s, (y+L)*s); dCtx.lineTo(x*s, y*s); dCtx.lineTo((x+L)*s, y*s); dCtx.moveTo((x+w-L)*s, y*s); dCtx.lineTo((x+w)*s, y*s); dCtx.lineTo((x+w)*s, (y+L)*s); dCtx.moveTo(x*s, (y+h-L)*s); dCtx.lineTo(x*s, (y+h)*s); dCtx.lineTo((x+L)*s, (y+h)*s); dCtx.moveTo((x+w-L)*s, (y+h)*s); dCtx.lineTo((x+w)*s, (y+h)*s); dCtx.lineTo((x+w)*s, (y+h-L)*s); dCtx.stroke(); }
        function drawStartScreen(dCtx, s) { dCtx.fillStyle = 'rgba(0, 0, 0, 0.8)'; dCtx.fillRect(0, 0, GAME_WIDTH*s, GAME_HEIGHT*s); dCtx.fillStyle = 'white'; dCtx.textAlign = 'center'; dCtx.font = `bold ${36*s}px "Comic Sans MS"`; dCtx.fillText('Quanti e la Missione dell’Invisibile', (GAME_WIDTH / 2)*s, (GAME_HEIGHT / 2 - 150)*s); dCtx.font = `${20*s}px "Comic Sans MS"`; dCtx.fillText("Il malvagio Dr. Clàsikon vuole rendere l'universo noioso e prevedibile!", (GAME_WIDTH/2)*s, (GAME_HEIGHT/2 - 90)*s); dCtx.fillText("Aiuta Quanti, il fotone con il jetpack, a salvare il Regno dell'Invisibile!", (GAME_WIDTH/2)*s, (GAME_HEIGHT/2 - 60)*s); dCtx.fillStyle = 'gold'; dCtx.font = `bold ${22*s}px "Comic Sans MS"`; dCtx.fillText("Livello 1: Il Salto Quantico", (GAME_WIDTH/2)*s, (GAME_HEIGHT/2 - 10)*s); dCtx.font = `${18*s}px "Comic Sans MS"`; dCtx.fillText("Colleziona pacchetti di energia per saltare da un atomo all'altro.", (GAME_WIDTH/2)*s, (GAME_HEIGHT/2 + 25)*s); const btn = startButton; dCtx.fillStyle = '#2c5b1b'; dCtx.fillRect(btn.x*s, btn.y*s, btn.width*s, btn.height*s); dCtx.fillStyle = 'white'; dCtx.font = `bold ${28*s}px "Comic Sans MS"`; dCtx.fillText("Inizia la Missione!", (btn.x + btn.width/2)*s, (btn.y + btn.height/2 + 5)*s); }
        function drawCompleteScreen(dCtx, s) { dCtx.fillStyle = 'rgba(0,0,0,0.7)'; dCtx.fillRect(0,0,GAME_WIDTH*s, GAME_HEIGHT*s); dCtx.fillStyle = 'white'; dCtx.textAlign = 'center'; dCtx.font = `bold ${40*s}px "Comic Sans MS"`; dCtx.fillText('Livello Superato!', (GAME_WIDTH/2)*s, (GAME_HEIGHT/2-80)*s); dCtx.font = `${22*s}px "Comic Sans MS"`; dCtx.fillText("Hai compiuto un Salto Quantico!", (GAME_WIDTH/2)*s, (GAME_HEIGHT/2-40)*s); dCtx.fillStyle = 'gold'; dCtx.font = `${18*s}px "Comic Sans MS"`; dCtx.fillText("Hai dimostrato che l'energia ha dei gradini, non puoi stare nel mezzo!", (GAME_WIDTH/2)*s, (GAME_HEIGHT/2)*s); dCtx.fillText("Proprio come saltare da un gradino all'altro, senza toccare l'aria!", (GAME_WIDTH/2)*s, (GAME_HEIGHT/2+30)*s); dCtx.fillStyle = 'white'; dCtx.font = `${22*s}px "Comic Sans MS"`; dCtx.fillText('Tocca un pulsante o premi un tasto per rigiocare', (GAME_WIDTH/2)*s, (GAME_HEIGHT/2+80)*s); }

        function gameLoop() {
            if (gameState === 'playing') update();
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            drawBackground();
            if (gameState === 'playing') {
                drawPlatforms(ctx); drawQuanta(ctx); drawPlayer(ctx); drawElectrons(ctx);
            }
            displayCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
            displayCtx.drawImage(gameCanvas, 0, 0, displayCanvas.width, displayCanvas.height);
            if (gameState === 'playing') {
                drawUI(displayCtx, scale);
            } else if (gameState === 'start') {
                drawStartScreen(displayCtx, scale);
            } else if (gameState === 'complete') {
                drawCompleteScreen(displayCtx, scale);
            }
            requestAnimationFrame(gameLoop);
        }

        function resize() { const ratio = GAME_WIDTH / GAME_HEIGHT; let newWidth = window.innerWidth; let newHeight = window.innerHeight; let newRatio = newWidth / newHeight; if (newRatio > ratio) newWidth = newHeight * ratio; else newHeight = newWidth / ratio; displayCanvas.style.width = newWidth + 'px'; displayCanvas.style.height = newHeight + 'px'; displayCanvas.width = newWidth; displayCanvas.height = newHeight; scale = newWidth / GAME_WIDTH; }

        window.addEventListener('resize', resize, false);
        setupLevel();
        resize();
        gameLoop();
    </script>
</body>
</html>
